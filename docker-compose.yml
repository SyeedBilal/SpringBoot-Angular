# ============================================================
# Production Docker Compose
# Starts the Angular frontend + Java/Maven backend together.
#
# Usage:
#   docker compose up --build            # build & run
#   docker compose up --build -d         # detached
#   docker compose down -v               # stop & remove volumes
# ============================================================

services:

  # ----------------------------------------------------------
  # Java / Spring Boot backend
  # ----------------------------------------------------------
  backend:
    build:
      context: ./emp_backend
      dockerfile: Dockerfile
    image: myapp/backend:latest
    container_name: myapp-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE:     ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL:      ${SPRING_DATASOURCE_URL:-jdbc:mysql://db:3306/employeedb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
    ports:
      - "8080:8080"
    networks:
      - appnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m

  # ----------------------------------------------------------
  # Angular frontend (served by Nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./employee-frontend-final
      dockerfile: Dockerfile
    image: myapp/frontend:latest
    container_name: myapp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - appnet
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # MySQL database
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: myapp-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-employeedb}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

# ============================================================
networks:
  appnet:
    driver: bridge

volumes:
  db_data: