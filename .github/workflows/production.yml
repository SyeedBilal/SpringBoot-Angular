name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback

env:
  AWS_REGION: ap-south-1
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Build Backend (Maven)
  # ============================================================
  build-backend:
    name: Build Backend (Java/Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # Run tests BEFORE packaging so failures are caught early
      - name: Run Backend Tests
        run: |
          cd emp_backend
          mvn test -B

      - name: Build with Maven
        run: |
          cd emp_backend
          mvn clean package -DskipTests -B

      # Artifact name  : backend-build
      # Artifact path  : emp_backend/target/*.jar
      # Stored as      : GitHub Actions artifact (zip) for 5 days
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: emp_backend/target/*.jar
          retention-days: 5

  # ============================================================
  # Build Frontend (Angular)
  # ============================================================
  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: employee-frontend-final/package-lock.json

      - name: Install dependencies
        run: |
          cd employee-frontend-final
          npm ci --no-fund --no-audit

      - name: Run frontend tests
        run: |
          cd employee-frontend-final
          npm run test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true   # non-blocking; remove once tests are stable

      - name: Build for production
        run: |
          cd employee-frontend-final
          npm run build -- --configuration=production

      # Artifact name  : frontend-build
      # Artifact path  : employee-frontend-final/dist/
      # Stored as      : GitHub Actions artifact (zip) for 5 days
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: employee-frontend-final/dist/
          retention-days: 5

  # ============================================================
  # Deploy to AWS EC2
  # ============================================================
  deploy:
    name: Deploy to Production
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    # Run on push to main OR when workflow_dispatch action = deploy
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Downloads backend-build artifact → ./backend-artifacts/
      # Inside: the JAR file, e.g. emp_backend-0.0.1-SNAPSHOT.jar
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./backend-artifacts

      # Downloads frontend-build artifact → ./frontend-artifacts/
      # Inside: browser/, index.html, main.js, polyfills.js, styles.css, etc.
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-artifacts

      # Resolve the JAR filename BEFORE SSH (runner has the file, EC2 does not yet)
      - name: Resolve JAR filename
        id: jar
        run: |
          JAR_FILE=$(ls ./backend-artifacts/*.jar | head -1)
          JAR_NAME=$(basename "$JAR_FILE")
          echo "name=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "path=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Resolved JAR: $JAR_NAME"

      # Copy artifacts to EC2 BEFORE SSH script runs
      # (scp inside an ssh-action script block does not work — the runner
      #  is not inside the EC2 shell, so it can't reach itself via scp)
      - name: Copy backend JAR to EC2
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem
          APP_HOME="/home/${{ secrets.EC2_USER }}/employee-app"
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p $APP_HOME/backend $APP_HOME/frontend"
          scp -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem \
            ${{ steps.jar.outputs.path }} \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$APP_HOME/backend/${{ steps.jar.outputs.name }}

      - name: Copy frontend dist to EC2
        run: |
          APP_HOME="/home/${{ secrets.EC2_USER }}/employee-app"
          # -r recursive, copies everything inside frontend-artifacts/
          # Angular output is inside dist/<project-name>/browser/
          scp -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem -r \
            ./frontend-artifacts/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$APP_HOME/frontend/

      - name: Deploy & Start services on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            #!/bin/bash
            set -e

            APP_HOME="/home/${{ secrets.EC2_USER }}/employee-app"
            BACKEND_PATH="$APP_HOME/backend"
            FRONTEND_PATH="$APP_HOME/frontend"
            JAR_NAME="${{ steps.jar.outputs.name }}"
            NGINX_ROOT="/var/www/html/employee-app"

            echo "🚀 Starting deployment..."

            # ── Backup current JAR for rollback ──────────────────────────
            if ls $BACKEND_PATH/*.jar 2>/dev/null | grep -v "$JAR_NAME" > /dev/null; then
              PREV_JAR=$(ls $BACKEND_PATH/*.jar | grep -v "$JAR_NAME" | head -1)
              cp "$PREV_JAR" "$BACKEND_PATH/previous.jar.bak" || true
            fi

            # ── Stop backend ──────────────────────────────────────────────
            echo "🛑 Stopping backend..."
            sudo systemctl stop employee-backend || true
            sleep 3

            # ── Write Spring Boot config ──────────────────────────────────
            echo "⚙️  Writing application.properties..."
            cat > $BACKEND_PATH/application.properties << EOF
            spring.datasource.url=${{ secrets.DB_URL }}
            spring.datasource.username=${{ secrets.DB_USER }}
            spring.datasource.password=${{ secrets.DB_PASSWORD }}
            spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
            spring.jpa.hibernate.ddl-auto=update
            server.port=8080
            spring.application.name=employee-management-system
            EOF

            # ── Update symlink so systemd always starts the latest JAR ────
            ln -sfn $BACKEND_PATH/$JAR_NAME $BACKEND_PATH/app.jar
            echo "🔗 Symlink: app.jar → $JAR_NAME"

            # ── Deploy frontend to nginx root ─────────────────────────────
            echo "📦 Deploying frontend to nginx root..."
            sudo mkdir -p $NGINX_ROOT
            sudo rsync -a --delete $FRONTEND_PATH/ $NGINX_ROOT/
            sudo chown -R www-data:www-data $NGINX_ROOT

            # ── Start backend ─────────────────────────────────────────────
            echo "▶️  Starting backend..."
            sudo systemctl start employee-backend
            sudo systemctl enable employee-backend

            # ── Reload nginx ──────────────────────────────────────────────
            echo "▶️  Reloading nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            # ── Health check (30 attempts × 3 s = 90 s max) ──────────────
            echo "✅ Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "✅ Backend is healthy!"
                exit 0
              fi
              echo "⏳ Attempt $i/30..."
              sleep 3
            done

            echo "❌ Health check failed after 90 seconds!"
            exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/ec2_key.pem

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "🌍 Frontend : http://${{ secrets.EC2_HOST }}"
          echo "🔌 Backend  : http://${{ secrets.EC2_HOST }}:8080/actuator/health"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above."
          exit 1

  # ============================================================
  # Rollback (Manual — workflow_dispatch only)
  # ============================================================
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            #!/bin/bash
            set -e

            APP_HOME="/home/${{ secrets.EC2_USER }}/employee-app"
            BACKEND_PATH="$APP_HOME/backend"

            echo "⏮️  Rolling back..."

            if [ ! -f "$BACKEND_PATH/previous.jar.bak" ]; then
              echo "❌ No backup JAR found. Cannot rollback."
              exit 1
            fi

            sudo systemctl stop employee-backend || true
            sleep 2

            # Restore backup JAR via symlink
            cp $BACKEND_PATH/previous.jar.bak $BACKEND_PATH/rollback.jar
            ln -sfn $BACKEND_PATH/rollback.jar $BACKEND_PATH/app.jar
            echo "🔗 Symlink: app.jar → rollback.jar"

            sudo systemctl start employee-backend
            sleep 5

            if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ Rollback successful!"
            else
              echo "❌ Rollback health check failed!"
              exit 1
            fi