name: CI - Tests

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Lint and Test Backend
  # ============================================================
  test-backend:
    name: Backend - Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: |
          cd emp_backend
          mvn clean test -B

      - name: Build backend
        run: |
          cd emp_backend
          mvn package -DskipTests -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: emp_backend/target/surefire-reports/
          retention-days: 7

  # ============================================================
  # Lint and Test Frontend
  # ============================================================
  test-frontend:
    name: Frontend - Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: employee-frontend-final/package-lock.json

      - name: Install dependencies
        run: |
          cd employee-frontend-final
          npm ci --no-fund --no-audit

      - name: Lint
        run: |
          cd employee-frontend-final
          npm run lint || true

      - name: Run tests
        run: |
          cd employee-frontend-final
          npm run test:ci || true

      - name: Build for production
        run: |
          cd employee-frontend-final
          npm run build -- --configuration=production

  # ============================================================
  # Code Coverage
  # ============================================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run SonarQube scan (optional)
        run: |
          cd emp_backend
          mvn verify sonar:sonar \
            -Dsonar.projectKey=employee-management-system \
            -Dsonar.sources=src/main \
            -Dsonar.tests=src/test \
            -Dsonar.coverage.exclusions="**/*Config.java" || true
        continue-on-error: true

  # ============================================================
  # Security Scan
  # ============================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Check dependencies
        run: |
          cd emp_backend
          mvn dependency-check:check --no-transfer-progress || true
        continue-on-error: true
