# ============================================================
# Service — Angular Frontend (ClusterIP)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: employee-app
  labels:
    app.kubernetes.io/name: employee-management-system
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
