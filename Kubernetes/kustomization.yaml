# ============================================================
# Kustomization — apply all manifests in the correct order
# ============================================================
# Usage:
#   kubectl apply -k Kubernetes/
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: employee-app

resources:
  # 1. Namespace (must come first)
  - namespace.yaml

  # 2. ConfigMaps & Secrets
  - mysql-configmap.yaml
  - mysql-secret.yaml
  - frontend-nginx-configmap.yaml

  # 3. Persistent storage
  - mysql-pvc.yaml

  # 4. Deployments
  - mysql-deployment.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml

  # 5. Services
  - mysql-service.yaml
  - backend-service.yaml
  - frontend-service.yaml

  # 6. Ingress
  - ingress.yml

  # 7. Autoscaling
  - hpa.yaml

  # 8. Network Policies
  - network-policy.yaml

commonLabels:
  app.kubernetes.io/part-of: employee-management-system
