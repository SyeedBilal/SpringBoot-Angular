# ============================================================
# Secret — MySQL + Spring Boot credentials
# ============================================================
# IMPORTANT: In production, use SealedSecrets, Vault, or
#            External Secrets Operator instead of plain Secrets.
#
# To regenerate base64 values:
#   echo -n 'your-password' | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: employee-app
  labels:
    app.kubernetes.io/name: employee-management-system
    app.kubernetes.io/component: database
type: Opaque
data:
  # echo -n 'root' | base64
  MYSQL_ROOT_PASSWORD: UHJvZ3JhbW1pbmcuaW4xQA==
  SPRING_DATASOURCE_USERNAME: cm9vdA==
  SPRING_DATASOURCE_PASSWORD: # enter your base64-encoded password here
